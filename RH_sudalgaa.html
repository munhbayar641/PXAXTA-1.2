<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>РХАХТА — Реле хамгаалалтын судалгаа</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a; --panel:#1e293b; --panel2:#334155;
  --border:#334155; --border2:#475569;
  --accent:#38bdf8; --success:#34d399; --warn:#fbbf24; --danger:#f87171;
  --text:#e2e8f0; --muted:#94a3b8;
  --mono:'Share Tech Mono', monospace; --sans:'Exo 2', sans-serif;
  --radius:10px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* HEADER */
.header{
  position:sticky; top:0; z-index:100;
  background:rgba(15,23,42,0.85);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  display:flex; align-items:center; gap:12px;
  height:56px;
}
.logo{
  font-family:var(--mono);
  font-size:13px; color:var(--accent);
  letter-spacing:2px;
  display:flex; align-items:center; gap:8px;
}
.logo-dot{
  width:8px; height:8px;
  background:var(--accent);
  border-radius:50%;
  box-shadow:0 0 12px var(--accent);
}
.nav{
  display:flex; gap:8px; flex-wrap:wrap;
  margin-left:10px;
}
.nav a{
  text-decoration:none;
  font-size:12px;
  color:var(--muted);
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:8px;
}
.nav a:hover{ border-color:var(--accent); color:var(--accent); background:rgba(56,189,248,0.06); }
.nav a.active{ color:#fff; border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }

.header-status{
  margin-left:auto;
  font-family:var(--mono); font-size:11px; color:var(--muted);
  display:flex; align-items:center; gap:6px;
}
.status-dot{ width:6px; height:6px; border-radius:50%; background:var(--warn); }

/* LAYOUT */
.layout{
  position:relative; z-index:1;
  display:grid;
  grid-template-columns:280px 1fr;
  height:calc(100vh - 56px);
}

/* SIDEBAR */
.sidebar{
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.sidebar-top{
  padding:12px;
  border-bottom:1px solid var(--border);
}
.search-box{
  width:100%;
  background:rgba(15,23,42,0.6);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:9px 12px;
  color:var(--text);
  font-size:13px;
  outline:none;
}
.search-box::placeholder{ color:var(--muted); }

.station-list{ flex:1; overflow-y:auto; padding:6px; }
.station-list::-webkit-scrollbar{ width:3px; }
.station-list::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }

.station-item{
  padding:9px 11px;
  border-radius:8px;
  cursor:pointer;
  border:1px solid transparent;
  margin-bottom:2px;
  transition:all .15s;
  display:flex; align-items:center; gap:9px;
}
.station-item:hover{ background:rgba(56,189,248,0.08); border-color:var(--border); }
.station-item.active{ background:rgba(56,189,248,0.12); border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
.s-icon{
  width:26px;height:26px;flex-shrink:0;
  background:var(--bg); border:1px solid var(--border);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
}
.s-name{ font-size:12px; font-weight:700; flex:1; }
.s-count{
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
  background:var(--bg);
  padding:2px 5px;
  border-radius:4px;
}

/* MAIN */
.main{ display:flex; flex-direction:column; overflow:hidden; }

.topbar{
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:var(--panel);
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
}
.main-title{ font-size:17px; font-weight:900; color:#fff; }
.main-meta{ font-size:11px; color:var(--muted); margin-top:2px; }
.topbar-right{ margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

.sel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:7px 12px;
  color:var(--text);
  font-size:12px;
  outline:none;
  cursor:pointer;
  min-width:180px;
}
.btn{
  padding:7px 14px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  font-weight:700;
  font-size:12px;
  cursor:pointer;
}
.btn:hover{ border-color:var(--accent); color:var(--accent); background:rgba(56,189,248,0.06); }

/* STATS */
.stats-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--border);
  border-bottom:1px solid var(--border);
}
.stat-card{
  background:var(--panel);
  padding:14px 18px;
  display:flex; align-items:center; gap:12px;
}
.stat-val{
  font-family:var(--mono);
  font-size:18px;
  font-weight:900;
  color:var(--accent);
  line-height:1;
}
.stat-label{ font-size:11px; color:var(--muted); margin-top:2px; }

/* TABLE */
.table-area{ flex:1; overflow:auto; }
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:12px;
}
thead{ position:sticky; top:0; z-index:10; }
th{
  background:var(--panel2);
  padding:10px 12px;
  text-align:left;
  font-size:10px;
  font-weight:900;
  letter-spacing:.8px;
  text-transform:uppercase;
  color:var(--muted);
  border:1px solid var(--border);
  white-space:nowrap;
}
td{
  border:1px solid var(--border);
  background:rgba(30,41,59,0.4);
  padding:8px 10px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
td.wrap{ white-space:normal; }
tbody tr:nth-child(even) td{ background:rgba(255,255,255,0.02); }
tr:hover td{ background:rgba(56,189,248,0.05); }

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid var(--border);
  padding:2px 8px;
  border-radius:999px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
}
.badge.ok{ border-color:rgba(52,211,153,.35); color:var(--success); }
.badge.bad{ border-color:rgba(248,113,113,.35); color:var(--danger); }

.center-msg{
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100%;
  gap:12px;
  color:var(--muted);
}
.loading-bar{
  width:180px; height:2px;
  background:var(--border);
  border-radius:1px;
  overflow:hidden;
}
.loading-bar::after{
  content:'';
  display:block;
  height:100%;
  width:40%;
  background:linear-gradient(90deg,var(--accent),#22d3ee);
  animation:lb 1s infinite;
}
@keyframes lb { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

.toast{
  position:fixed; bottom:24px; right:24px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 18px;
  font-size:13px;
  z-index:1000;
  transform:translateY(70px);
  opacity:0;
  transition:all .3s ease;
  box-shadow:0 10px 40px rgba(0,0,0,.3);
}
.toast.show{ transform:translateY(0); opacity:1; }
.toast.success{ border-color:var(--success); }
.toast.error{ border-color:var(--danger); }
</style>
</head>

<body>
  <div class="header">
    <div class="logo"><span class="logo-dot"></span>РХАХТА · РЕЛЕ СУДАЛГАА</div>
    <div class="nav">
      
      <a href="index.html">Home</a>
      <a href="tavil.html">Тавилын карт</a>
      <a href="RH_sudalgaa.html" class="active">Реле судалгаа</a>

    </div>
    <div class="header-status">
      <div class="status-dot" id="conn-dot"></div>
      <span id="conn-text">Холбогдож байна...</span>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-top">
        <input class="search-box" id="station-search" placeholder="🔍  Станц хайх..." type="text"/>
      </div>
      <div class="station-list" id="station-list">
        <div class="center-msg" style="height:180px">
          <div class="loading-bar"></div>
          <p style="font-size:12px">Уншиж байна...</p>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <div>
          <div class="main-title" id="main-title">Станц сонгоно уу</div>
          <div class="main-meta" id="main-meta">← Зүүн талаас сонгоно уу</div>
        </div>

        <div class="topbar-right">
          <select class="sel" id="status-filter">
            <option value="">Бүх төлөв</option>
            <option value="Ашиглалтад">Ашиглалтад</option>
            <option value="Буулгасан">Буулгасан</option>
          </select>
          <button class="btn" onclick="exportCSV()">⬇ CSV</button>
          <button class="btn" onclick="refreshData()">↻</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div style="font-size:18px">🛡️</div>
          <div><div class="stat-val" id="st-total">—</div><div class="stat-label">Нийт РХ</div></div>
        </div>
        <div class="stat-card">
          <div style="font-size:18px">✅</div>
          <div><div class="stat-val" id="st-active">—</div><div class="stat-label">Ашиглалтад</div></div>
        </div>
        <div class="stat-card">
          <div style="font-size:18px">🧯</div>
          <div><div class="stat-val" id="st-removed">—</div><div class="stat-label">Буулгасан</div></div>
        </div>
        <div class="stat-card">
          <div style="font-size:18px">🏭</div>
          <div><div class="stat-val" id="st-mfg">—</div><div class="stat-label">Үйлдвэрлэгч (тоо)</div></div>
        </div>
      </div>

      <div class="table-area" id="table-area">
        <div class="center-msg">
          <div style="font-size:42px;opacity:.3">⚡</div>
          <p>Станц сонгоод РХ жагсаалт харна уу</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://skpitxwtpqwoaydoltft.supabase.co';
const SB_KEY = 'sb_publishable_0WG4j8BScWCUcbfJ77s8aA_gu2M7fuu';
const sb = supabase.createClient(SB_URL, SB_KEY);

let allStations = [];
let currentStation = null;
let stationRows = [];

function toast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function setConn(ok){
  document.getElementById('conn-dot').style.background = ok ? 'var(--success)' : 'var(--danger)';
  document.getElementById('conn-text').textContent = ok ? 'Supabase — Холбогдсон' : 'Холболт алдаа';
}
function esc(s=''){
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

async function init(){
  try{
    const { error: pingErr } = await sb.from('v_rh').select('station_name').limit(1);
    if (pingErr) throw pingErr;
    setConn(true);
    await loadStations();
    toast('✅ Холбогдлоо','success');
  }catch(e){
    console.error(e);
    setConn(false);
    document.getElementById('station-list').innerHTML =
      '<div style="padding:12px;color:var(--danger);font-size:12px">' +
      'Алдаа: ' + esc(e.message || String(e)) +
      '</div>';
    toast('❌ Алдаа гарлаа','error');
  }
}

const ICONS = ['🛡️','⚡','🔌','🏭','🔧','📡','🔋','⚙️','💡','🔩'];

async function loadStations(){
  const { data, error } = await sb
    .from('v_rh')
    .select('station_name')
    .not('station_name','is',null)
    .limit(100000);
  if (error) throw error;

  const collator = new Intl.Collator('mn', { sensitivity:'base', numeric:true });
  const unique = [...new Set((data||[]).map(r => r.station_name).filter(v => v && String(v).trim() !== ''))]
    .sort((a,b)=>collator.compare(a,b));

  allStations = unique.map(name => ({ name }));
  renderSidebar(allStations);
}

function renderSidebar(list){
  const el = document.getElementById('station-list');
  if(!list.length){
    el.innerHTML = '<div class="center-msg" style="height:120px"><p>Станц олдсонгүй</p></div>';
    return;
  }
  el.innerHTML = '';
  list.forEach((s,i)=>{
    const item = document.createElement('div');
    item.className = 'station-item' + (currentStation===s.name ? ' active' : '');
    item.onclick = ()=>selectStation(s.name);

    const icon = document.createElement('div');
    icon.className = 's-icon';
    icon.textContent = ICONS[i % ICONS.length];

    const name = document.createElement('div');
    name.className = 's-name';
    name.textContent = s.name;

    const count = document.createElement('div');
    count.className = 's-count';
    count.textContent = 'РХ';

    item.appendChild(icon);
    item.appendChild(name);
    item.appendChild(count);
    el.appendChild(item);
  });
}

document.getElementById('station-search').addEventListener('input', (e)=>{
  const q = (e.target.value || '').toLowerCase();
  const filtered = allStations.filter(s => (s.name||'').toLowerCase().includes(q));
  renderSidebar(filtered);
});

async function selectStation(name){
  currentStation = name;
  renderSidebar(allStations);

  document.getElementById('main-title').textContent = name;
  document.getElementById('main-meta').textContent = 'Уншиж байна...';
  document.getElementById('table-area').innerHTML =
    '<div class="center-msg"><div class="loading-bar"></div><p>Уншиж байна...</p></div>';

  const { data, error } = await sb
    .from('v_rh')
    .select('*')
    .eq('station_name', name)
    .limit(100000);

  if (error) {
    console.error(error);
    document.getElementById('table-area').innerHTML =
      '<div class="center-msg"><div style="font-size:42px;opacity:.3">⚠️</div><p>'+esc(error.message)+'</p></div>';
    return;
  }

  stationRows = data || [];
  updateStats();
  applyFilters();
}

document.getElementById('status-filter').addEventListener('change', applyFilters);

function updateStats(){
  const total = stationRows.length;
  const active = stationRows.filter(r => (r.status||'').toLowerCase().includes('ашиг')).length;
  const removed = stationRows.filter(r => (r.status||'').toLowerCase().includes('буул')).length;
  const mfgSet = new Set(stationRows.map(r => (r.mfg_name||'').trim()).filter(Boolean));

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-active').textContent = active;
  document.getElementById('st-removed').textContent = removed;
  document.getElementById('st-mfg').textContent = mfgSet.size;
  document.getElementById('main-meta').textContent = total + ' мөр · ' + mfgSet.size + ' үйлдвэрлэгч';
}

function applyFilters(){
  const sf = document.getElementById('status-filter').value;
  let rows = stationRows.slice();
  if (sf) rows = rows.filter(r => (r.status||'') === sf);
  renderTable(rows);
}

function renderTable(rows){
  const area = document.getElementById('table-area');
  if(!rows.length){
    area.innerHTML = '<div class="center-msg"><div style="font-size:42px;opacity:.3">📭</div><p>Өгөгдөл байхгүй</p></div>';
    return;
  }

  rows.sort((a,b)=>String(a.equipment_name||'').localeCompare(String(b.equipment_name||''),'mn'));

  let html = '';
  html += '<table><thead><tr>';
  html += '<th style="width:50px">ДД</th>';
  html += '<th style="width:260px">Тоноглолын нэр</th>';
  html += '<th style="width:90px">кВ</th>';
  html += '<th style="width:120px">Төрөл</th>';
  html += '<th style="width:120px">Марк</th>';
  html += '<th style="width:220px">Үйлдвэрлэгч</th>';
  html += '<th style="width:110px">Улс</th>';
  html += '<th style="width:150px">Серийн №</th>';
  html += '<th style="width:140px">Үйлдвэр огноо</th>';
  html += '<th style="width:140px">Суурилуулсан</th>';
  html += '<th style="width:160px">Хүчдэлд залгасан</th>';
  html += '<th style="width:140px">Буулгасан</th>';
  html += '<th style="width:160px">Партын №</th>';
  html += '<th style="width:140px">Төлөв</th>';
  html += '<th style="width:260px">Тайлбар</th>';
  html += '<th style="width:120px">Зураг</th>';
  html += '</tr></thead><tbody>';

  for(let idx=0; idx<rows.length; idx++){
    const r = rows[idx];
    const status = (r.status||'').toLowerCase();
    const badgeClass = status.includes('ашиг') ? 'ok' : (status.includes('буул') ? 'bad' : '');

    html += '<tr>';
    html += '<td>'+(idx+1)+'</td>';
    html += '<td title="'+esc(r.equipment_name||'')+'">'+esc(r.equipment_name||'')+'</td>';
    html += '<td>'+esc(r.voltage_kv_text||'')+'</td>';
    html += '<td>'+esc(r.equipment_type||'')+'</td>';
    html += '<td>'+esc(r.model||'')+'</td>';
    html += '<td title="'+esc(r.mfg_name||'')+'">'+esc(r.mfg_name||'')+'</td>';
    html += '<td>'+esc(r.mfg_country||'')+'</td>';
    html += '<td>'+esc(r.serial_no||'')+'</td>';
    html += '<td>'+esc(r.mfg_date_text||'')+'</td>';
    html += '<td>'+esc(r.install_date_text||'')+'</td>';
    html += '<td>'+esc(r.energized_date_text||'')+'</td>';
    html += '<td>'+esc(r.decommission_date_text||'')+'</td>';
    html += '<td>'+esc(r.part_no||'')+'</td>';
    html += '<td><span class="badge '+badgeClass+'">'+esc(r.status||'—')+'</span></td>';
    html += '<td class="wrap" title="'+esc(r.comment||'')+'">'+esc(r.comment||'')+'</td>';

    if (r.image_url && String(r.image_url).trim() !== ''){
      html += '<td><a class="btn" style="padding:4px 10px" target="_blank" href="'+esc(r.image_url)+'">Open</a></td>';
    } else {
      html += '<td>—</td>';
    }
    html += '</tr>';
  }

  html += '</tbody></table>';
  area.innerHTML = html;
}

function refreshData(){
  if (currentStation) selectStation(currentStation);
  else init();
}

function exportCSV(){
  if(!currentStation || !stationRows.length){
    toast('Өгөгдөл байхгүй','error');
    return;
  }
  const sf = document.getElementById('status-filter').value;
  let rows = stationRows.slice();
  if (sf) rows = rows.filter(r => (r.status||'') === sf);

  const header = ['Станц','Тоноглол','кV','Төрөл','Марк','Үйлдвэрлэгч','Улс','Серийн№','Үйлдвэр огноо','Суурилуулсан','Хүчдэлд залгасан','Буулгасан','Партын №','Төлөв','Тайлбар','Зураг'];
  const body = rows.map(r => [
    r.station_name||'',
    r.equipment_name||'',
    r.voltage_kv_text||'',
    r.equipment_type||'',
    r.model||'',
    r.mfg_name||'',
    r.mfg_country||'',
    r.serial_no||'',
    r.mfg_date_text||'',
    r.install_date_text||'',
    r.energized_date_text||'',
    r.decommission_date_text||'',
    r.part_no||'',
    r.status||'',
    r.comment||'',
    r.image_url||''
  ]);

  const csv = [header, ...body]
    .map(row => row.map(v => '"' + String(v).replaceAll('"','""') + '"').join(','))
    .join('\n');

  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = currentStation + '_RH.csv';
  a.click();
  toast('✅ CSV татагдлаа','success');
}

init();
</script>
</body>
</html>
